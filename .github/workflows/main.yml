# Nome do workflow, aparece na aba "Actions"
name: Pipeline CI/CD

# Definir quando o pipeline será disparado
on:
  push:
    branches:
      - main
  workflow_dispatch: # habilitar o botão "Run workflow" no Github Actions

jobs:
  # Primeiro job: build
  build:
    runs-on: ubuntu-latest # imagem da máquina usada no CI

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Instalação do Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalação das dependências
        run: npm install

      - name: Rodar o build
        run: npm run build

